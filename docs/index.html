<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INA Premium Gorivo</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-233EMZJM16"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-233EMZJM16');
  </script>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="manifest" href="assets/site.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      background: #1a56db;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    header .text h1 { font-size: 1.2rem; font-weight: 700; }
    header .text p  { font-size: 0.85rem; margin-top: 4px; opacity: 0.9; }

    #lang-toggle {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #lang-toggle:hover { background: rgba(255,255,255,0.35); }

    #content {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    main {
      width: 400px;
      flex-shrink: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid #ddd;
      background: #f5f5f5;
    }

    #map {
      flex: 1;
      min-width: 0;
    }

    #fuel-select {
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.875rem;
      flex-shrink: 0;
      outline: none;
      background: #fff;
      cursor: pointer;
    }
    #fuel-select:focus { border-color: #1a56db; box-shadow: 0 0 0 2px #bfdbfe; }

    #list-heading {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    #filter {
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.875rem;
      flex-shrink: 0;
      outline: none;
    }
    #filter:focus { border-color: #1a56db; box-shadow: 0 0 0 2px #bfdbfe; }

    #station-list {
      list-style: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow-y: auto;
      scrollbar-gutter: stable;
      background: #fff;
      flex: 1;
      min-height: 0;
    }

    #station-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px 10px 14px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      transition: background 0.1s;
    }
    #station-list li:last-child { border-bottom: none; }
    #station-list li:hover { background: #eff6ff; }
    #station-list li.active { background: #bfdbfe; }

    #station-list li .name { font-weight: 500; }

    #station-list li a {
      font-size: 0.8rem;
      color: #1a56db;
      text-decoration: none;
      border: 1px solid #1a56db;
      border-radius: 3px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 10px;
    }
    #station-list li a:hover { background: #1a56db; color: #fff; }

    #menu-toggle { display: none; }

    @media (max-width: 700px) {
      header { padding: 10px 14px; gap: 8px; align-items: center; }
      header .text h1 { font-size: 1rem; }
      header .text p  { display: none; }

      #menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.5);
        color: #fff;
        width: 36px;
        height: 36px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1.2rem;
        flex-shrink: 0;
        order: -1;
      }
      #menu-toggle:hover { background: rgba(255,255,255,0.35); }

      #map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #content {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      #sidebar-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 1100;
      }
      #sidebar-overlay.open { display: block; }

      main {
        position: absolute;
        top: 0;
        left: 0;
        width: 85%;
        max-width: 340px;
        height: 100%;
        z-index: 1200;
        border-right: 1px solid #ddd;
        padding: 14px;
        transform: translateX(-105%);
        transition: transform 0.25s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);
      }
      main.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <header>
    <button id="menu-toggle">&#9776;</button>
    <div class="text">
      <h1 id="i18n-title"></h1>
      <p id="i18n-subtitle"></p>
    </div>
    <button id="lang-toggle"></button>
  </header>

  <div id="content">
    <div id="sidebar-overlay"></div>
    <main>
      <select id="fuel-select">
        <option value="gasoline"></option>
        <option value="diesel"></option>
      </select>
      <p id="list-heading"></p>
      <input id="filter" type="search" />
      <ul id="station-list"></ul>
    </main>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const I18N = {
      hr: {
        title:    'INA postaje s Premium gorivom po cijeni redovnog',
        subtitle: 'Zbog regulacije cijena, ove postaje prodaju Premium gorivo po cijeni redovnog',
        heading:  n => `Popis postaja (${n} postaja)`,
        link:     'Detalji',
        toggle:   'EN',
        filter:   'Pretraži postaje…',
        gasoline: 'Eurosuper 95 Class Plus Premium',
        diesel:   'Eurodiesel Class Plus Premium',
      },
      en: {
        title:    'INA stations with Premium fuel at regular price',
        subtitle: 'Due to price regulation, these stations sell Premium fuel at the regular fuel price',
        heading:  n => `Station list (${n} stations)`,
        link:     'Details',
        toggle:   'HR',
        filter:   'Search stations…',
        gasoline: 'Eurosuper 95 Class Plus Premium',
        diesel:   'Eurodiesel Class Plus Premium',
      },
    };

    let lang      = localStorage.getItem('lang') || 'hr';
    let fuelType  = localStorage.getItem('fuelType') || 'gasoline';
    let stationsData = [];
    let markers = [];
    let activeIndex = -1;

    const map = L.map('map').setView([45.1, 16.4], 7);
    requestAnimationFrame(() => map.invalidateSize());
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(map);

    function applyLang() {
      const t = I18N[lang];
      document.documentElement.lang = lang;
      document.getElementById('i18n-title').textContent    = t.title;
      document.getElementById('i18n-subtitle').textContent = t.subtitle;
      document.getElementById('lang-toggle').textContent   = t.toggle;
      document.getElementById('list-heading').textContent  = t.heading(stationsData.length);
      document.getElementById('filter').placeholder        = t.filter;
      document.querySelectorAll('#fuel-select option').forEach(o => {
        o.textContent = t[o.value];
      });
      document.querySelectorAll('#station-list li a').forEach(a => {
        a.textContent = t.link;
      });
    }

    function setActive(index) {
      const items = document.querySelectorAll('#station-list li');
      if (activeIndex >= 0 && items[activeIndex]) items[activeIndex].classList.remove('active');
      activeIndex = index;
      if (items[index]) {
        items[index].classList.add('active');
        items[index].scrollIntoView({ block: 'nearest' });
      }
      if (markers[index]) markers[index].openPopup();
    }

    function buildList() {
      const ul = document.getElementById('station-list');
      ul.innerHTML = '';
      stationsData.forEach((s, i) => {
        const li = document.createElement('li');
        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = s.name;
        const a = document.createElement('a');
        a.href = s.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = I18N[lang].link;
        a.addEventListener('click', e => e.stopPropagation());
        li.appendChild(name);
        li.appendChild(a);
        li.addEventListener('click', () => {
          map.setView([parseFloat(s.lat), parseFloat(s.lng)], 14);
          setActive(i);
        });
        ul.appendChild(li);
      });
    }

    function buildMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      stationsData.forEach((s, i) => {
        const m = L.marker([parseFloat(s.lat), parseFloat(s.lng)]).addTo(map);
        m.bindPopup(`<strong>${s.name}</strong><br><a href="${s.url}" target="_blank" rel="noopener noreferrer">${I18N[lang].link}</a>`);
        m.on('click', () => setActive(i));
        markers.push(m);
      });
    }

    const sidebar = document.querySelector('main');
    const overlay = document.getElementById('sidebar-overlay');

    function openSidebar()  { sidebar.classList.add('open');  overlay.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

    document.getElementById('menu-toggle').addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);

    // close sidebar when user taps a station on mobile
    sidebar.addEventListener('click', e => {
      if (e.target.closest('li') && window.innerWidth <= 700) closeSidebar();
    });

    document.getElementById('lang-toggle').addEventListener('click', () => {
      lang = lang === 'hr' ? 'en' : 'hr';
      localStorage.setItem('lang', lang);
      applyLang();
      // Rebuild popups with updated link label
      markers.forEach((m, i) => {
        const s = stationsData[i];
        m.setPopupContent(`<strong>${s.name}</strong><br><a href="${s.url}" target="_blank" rel="noopener noreferrer">${I18N[lang].link}</a>`);
      });
    });

    document.getElementById('filter').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      document.querySelectorAll('#station-list li').forEach((li, i) => {
        const match = stationsData[i].name.toLowerCase().includes(q);
        li.style.display = match ? '' : 'none';
      });
    });

    function loadFuel(type) {
      fuelType = type;
      localStorage.setItem('fuelType', type);
      document.getElementById('filter').value = '';
      fetch(`premium-${type}.json`)
        .then(r => r.json())
        .then(data => {
          stationsData = data;
          buildMarkers();
          buildList();
          applyLang();
          if (data.length > 0) {
            const bounds = L.latLngBounds(data.map(s => [parseFloat(s.lat), parseFloat(s.lng)]));
            map.fitBounds(bounds, { padding: [40, 40] });
          }
        })
        .catch(err => {
          document.getElementById('list-heading').textContent = 'Error loading data: ' + err.message;
        });
    }

    const fuelSelect = document.getElementById('fuel-select');
    fuelSelect.value = fuelType;
    fuelSelect.addEventListener('change', e => loadFuel(e.target.value));

    applyLang();
    loadFuel(fuelType);
  </script>
</body>
</html>
