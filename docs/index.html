<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INA Premium Gorivo – postaje s premium gorivom po cijeni redovnog</title>
  <meta name="description" content="Karta INA benzinskih postaja koje prodaju isključivo premium gorivo (Eurosuper 95 Class Plus Premium ili Eurodiesel Class Plus Premium) po cijeni redovnog goriva, zbog regulacije cijena u Hrvatskoj.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://jurakovic.github.io/premium-fuel/">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jurakovic.github.io/premium-fuel/">
  <meta property="og:title" content="INA Premium Gorivo – postaje s premium gorivom po cijeni redovnog">
  <meta property="og:description" content="Karta INA benzinskih postaja koje prodaju isključivo premium gorivo po cijeni redovnog, zbog regulacije cijena u Hrvatskoj.">
  <meta property="og:image" content="https://jurakovic.github.io/premium-fuel/assets/android-chrome-512x512.png">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-233EMZJM16"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-233EMZJM16');
  </script>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="manifest" href="assets/site.webmanifest">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg:            #f5f5f5;
      --list-bg:       #fff;
      --border:        #ddd;
      --border-light:  #eee;
      --text:          #222;
      --text-muted:    #888;
      --hover-bg:      #eff6ff;
      --active-bg:     #bfdbfe;
      --input-bg:      #fff;
      --input-border:  #ccc;
      --accent:        #1a56db;
      --accent-shadow: #bfdbfe;
      color-scheme: light;
    }
    [data-theme="dark"] {
      --bg:            #18181b;
      --list-bg:       #27272a;
      --border:        #3f3f46;
      --border-light:  #3f3f46;
      --text:          #f4f4f5;
      --text-muted:    #a1a1aa;
      --hover-bg:      #1e3a5f;
      --active-bg:     #1e40af;
      --input-bg:      #27272a;
      --input-border:  #52525b;
      --accent:        #60a5fa;
      --accent-shadow: #1e3a5f;
      color-scheme: dark;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      background: #1a56db;
      color: #fff;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    header .text h1 { font-size: 1.2rem; font-weight: 700; }
    header .text p  { font-size: 0.85rem; margin-top: 4px; opacity: 0.9; }

    #lang-toggle {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #lang-toggle:hover { background: rgba(255,255,255,0.35); }

    #content {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    main {
      width: 400px;
      flex-shrink: 0;
      padding: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    #map {
      flex: 1;
      min-width: 0;
    }

    #fuel-select {
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 10px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 0.875rem;
      flex-shrink: 0;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      cursor: pointer;
    }
    #fuel-select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-shadow); }

    #list-heading {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    #filter {
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 10px;
      border: 1px solid var(--input-border);
      border-radius: 4px;
      font-size: 0.875rem;
      flex-shrink: 0;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
    }
    #filter:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-shadow); }

    #station-list {
      list-style: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-y: auto;
      scrollbar-gutter: stable;
      background: var(--list-bg);
      flex: 1;
      min-height: 0;
    }

    #station-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px 10px 14px;
      border-bottom: 1px solid var(--border-light);
      cursor: pointer;
      transition: background 0.1s;
    }
    #station-list li:last-child { border-bottom: none; }
    #station-list li:hover { background: var(--hover-bg); }
    #station-list li.active { background: var(--active-bg); }

    #station-list li .name { font-weight: 500; }

    #station-list li a {
      font-size: 0.8rem;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 3px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 10px;
    }
    #station-list li a:hover { background: var(--accent); color: var(--list-bg); }

    footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 10px 0 2px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    #theme-toggle {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      line-height: 1;
    }
    #theme-toggle:hover { color: var(--accent); }

    /* Leaflet dark overrides */
    [data-theme="dark"] .leaflet-popup-content-wrapper,
    [data-theme="dark"] .leaflet-popup-tip { background: var(--list-bg); color: var(--text); }
    [data-theme="dark"] .leaflet-popup-content-wrapper a { color: var(--accent); }
    [data-theme="dark"] .leaflet-bar a {
      background-color: var(--list-bg);
      color: var(--text);
      border-color: var(--border);
    }
    [data-theme="dark"] .leaflet-bar a:hover { background-color: var(--hover-bg); }

    #menu-toggle { display: none; }

    @media (max-width: 700px) {
      header { padding: 10px 14px; gap: 8px; align-items: center; }
      header .text h1 { font-size: 1rem; }
      header .text p  { display: none; }

      #menu-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.5);
        color: #fff;
        width: 36px;
        height: 36px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 1.2rem;
        flex-shrink: 0;
        order: -1;
      }
      #menu-toggle:hover { background: rgba(255,255,255,0.35); }

      #map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #content {
        position: relative;
        flex: 1;
        min-height: 0;
      }

      #sidebar-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 1100;
      }
      #sidebar-overlay.open { display: block; }

      main {
        position: absolute;
        top: 0;
        left: 0;
        width: 85%;
        max-width: 340px;
        height: 100%;
        z-index: 1200;
        border-right: 1px solid var(--border);
        padding: 14px;
        transform: translateX(-105%);
        transition: transform 0.25s ease;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);
      }
      main.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <header>
    <button id="menu-toggle">&#9776;</button>
    <div class="text">
      <h1 id="i18n-title"></h1>
      <p id="i18n-subtitle"></p>
    </div>
    <button id="lang-toggle"></button>
  </header>

  <div id="content">
    <div id="sidebar-overlay"></div>
    <main>
      <select id="fuel-select">
        <option value="gasoline"></option>
        <option value="diesel"></option>
      </select>
      <p id="list-heading"></p>
      <input id="filter" type="search" />
      <ul id="station-list"></ul>
      <footer>
        <a id="i18n-home" href="https://jurakovic.github.io">Početna</a>
        &nbsp;·&nbsp;
        <a href="https://github.com/jurakovic/premium-fuel"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:-2px;margin-right:4px;" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>GitHub</a>
        &nbsp;·&nbsp;
        <button id="theme-toggle"></button>
      </footer>
    </main>
    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const I18N = {
      hr: {
        title:       'INA postaje s Premium gorivom po cijeni redovnog',
        subtitle:    'Zbog regulacije cijena, ove postaje prodaju Premium gorivo po cijeni redovnog',
        heading:     n => `Popis postaja (${n} postaja)`,
        link:        'Detalji',
        toggle:      'EN',
        filter:      'Pretraži postaje…',
        gasoline:    'Eurosuper 95 Class Plus Premium',
        diesel:      'Eurodiesel Class Plus Premium',
        home:        'Početna',
        themeSystem: 'Tema: Sustav',
        themeLight:  'Tema: Svijetla',
        themeDark:   'Tema: Tamna',
      },
      en: {
        title:       'INA stations with Premium fuel at regular price',
        subtitle:    'Due to price regulation, these stations sell Premium fuel at the regular fuel price',
        heading:     n => `Station list (${n} stations)`,
        link:        'Details',
        toggle:      'HR',
        filter:      'Search stations…',
        gasoline:    'Eurosuper 95 Class Plus Premium',
        diesel:      'Eurodiesel Class Plus Premium',
        home:        'Home',
        themeSystem: 'Theme: System',
        themeLight:  'Theme: Light',
        themeDark:   'Theme: Dark',
      },
    };

    const THEME_ICONS = {
      system: `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
      light:  `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="7.05" y2="7.05"/><line x1="16.95" y1="16.95" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="7.05" y2="16.95"/><line x1="16.95" y1="7.05" x2="19.78" y2="4.22"/></svg>`,
      dark:   `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
    };

    const THEME_CYCLE = ['system', 'light', 'dark'];

    const TILES = {
      light: {
        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      },
      dark: {
        url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
      },
    };

    let lang      = localStorage.getItem('lang')      || 'hr';
    let fuelType  = localStorage.getItem('fuelType')  || 'gasoline';
    let theme     = localStorage.getItem('theme')     || 'system';
    let stationsData = [];
    let markers = [];
    let activeIndex = -1;

    const map = L.map('map', { zoomControl: false }).setView([45.1, 16.4], 7);
    L.control.zoom({ position: 'topright' }).addTo(map);
    requestAnimationFrame(() => map.invalidateSize());

    let tileLayer = null;

    function getEffectiveTheme() {
      if (theme === 'system') {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      return theme;
    }

    function applyTheme() {
      const effective = getEffectiveTheme();
      document.documentElement.setAttribute('data-theme', effective);

      const tileConf = TILES[effective];
      if (tileLayer) map.removeLayer(tileLayer);
      tileLayer = L.tileLayer(tileConf.url, { attribution: tileConf.attribution, maxZoom: 19 }).addTo(map);

      const btn = document.getElementById('theme-toggle');
      btn.innerHTML = THEME_ICONS[theme];
      btn.title = I18N[lang]['theme' + theme.charAt(0).toUpperCase() + theme.slice(1)];
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (theme === 'system') applyTheme();
    });

    document.getElementById('theme-toggle').addEventListener('click', () => {
      theme = THEME_CYCLE[(THEME_CYCLE.indexOf(theme) + 1) % THEME_CYCLE.length];
      localStorage.setItem('theme', theme);
      applyTheme();
    });

    function applyLang() {
      const t = I18N[lang];
      document.documentElement.lang = lang;
      document.getElementById('i18n-title').textContent    = t.title;
      document.getElementById('i18n-subtitle').textContent = t.subtitle;
      document.getElementById('lang-toggle').textContent   = t.toggle;
      document.getElementById('list-heading').textContent  = t.heading(stationsData.length);
      document.getElementById('filter').placeholder        = t.filter;
      document.getElementById('i18n-home').textContent     = t.home;
      document.getElementById('theme-toggle').title        = t['theme' + theme.charAt(0).toUpperCase() + theme.slice(1)];
      document.querySelectorAll('#fuel-select option').forEach(o => {
        o.textContent = t[o.value];
      });
      document.querySelectorAll('#station-list li a').forEach(a => {
        a.textContent = t.link;
      });
    }

    function setActive(index) {
      const items = document.querySelectorAll('#station-list li');
      if (activeIndex >= 0 && items[activeIndex]) items[activeIndex].classList.remove('active');
      activeIndex = index;
      if (items[index]) {
        items[index].classList.add('active');
        items[index].scrollIntoView({ block: 'nearest' });
      }
      if (markers[index]) markers[index].openPopup();
    }

    function buildList() {
      const ul = document.getElementById('station-list');
      ul.innerHTML = '';
      stationsData.forEach((s, i) => {
        const li = document.createElement('li');
        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = s.name;
        const a = document.createElement('a');
        a.href = s.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = I18N[lang].link;
        a.addEventListener('click', e => e.stopPropagation());
        li.appendChild(name);
        li.appendChild(a);
        li.addEventListener('click', () => {
          map.setView([parseFloat(s.lat), parseFloat(s.lng)], 14);
          setActive(i);
        });
        ul.appendChild(li);
      });
    }

    function buildMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = [];
      stationsData.forEach((s, i) => {
        const m = L.marker([parseFloat(s.lat), parseFloat(s.lng)]).addTo(map);
        m.bindPopup(`<strong>${s.name}</strong><br><a href="${s.url}" target="_blank" rel="noopener noreferrer">${I18N[lang].link}</a>`);
        m.on('click', () => setActive(i));
        markers.push(m);
      });
    }

    const sidebar = document.querySelector('main');
    const overlay = document.getElementById('sidebar-overlay');

    function openSidebar()  { sidebar.classList.add('open');  overlay.classList.add('open'); }
    function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }

    document.getElementById('menu-toggle').addEventListener('click', () => {
      sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
    });
    overlay.addEventListener('click', closeSidebar);

    // close sidebar when user taps a station on mobile
    sidebar.addEventListener('click', e => {
      if (e.target.closest('li') && window.innerWidth <= 700) closeSidebar();
    });

    document.getElementById('lang-toggle').addEventListener('click', () => {
      lang = lang === 'hr' ? 'en' : 'hr';
      localStorage.setItem('lang', lang);
      applyLang();
      // Rebuild popups with updated link label
      markers.forEach((m, i) => {
        const s = stationsData[i];
        m.setPopupContent(`<strong>${s.name}</strong><br><a href="${s.url}" target="_blank" rel="noopener noreferrer">${I18N[lang].link}</a>`);
      });
    });

    document.getElementById('filter').addEventListener('input', e => {
      const q = e.target.value.trim().toLowerCase();
      document.querySelectorAll('#station-list li').forEach((li, i) => {
        const match = stationsData[i].name.toLowerCase().includes(q);
        li.style.display = match ? '' : 'none';
      });
    });

    function loadFuel(type) {
      fuelType = type;
      localStorage.setItem('fuelType', type);
      document.getElementById('filter').value = '';
      fetch(`premium-${type}.json`)
        .then(r => r.json())
        .then(data => {
          stationsData = data;
          buildMarkers();
          buildList();
          applyLang();
          if (data.length > 0) {
            const bounds = L.latLngBounds(data.map(s => [parseFloat(s.lat), parseFloat(s.lng)]));
            map.fitBounds(bounds, { padding: [40, 40] });
          }
        })
        .catch(err => {
          document.getElementById('list-heading').textContent = 'Error loading data: ' + err.message;
        });
    }

    const fuelSelect = document.getElementById('fuel-select');
    fuelSelect.value = fuelType;
    fuelSelect.addEventListener('change', e => loadFuel(e.target.value));

    applyTheme();
    applyLang();
    loadFuel(fuelType);
  </script>
</body>
</html>
